<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DashAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
<style>
:root {
  --bg:#070710; --surf:#0d0d1c; --surf2:#11112a;
  --gl:rgba(255,255,255,0.05); --glh:rgba(255,255,255,0.09);
  --bd:rgba(255,255,255,0.09); --bds:rgba(255,255,255,0.17);
  --tx:#eaeaf6; --sub:rgba(234,234,246,0.44); --sub2:rgba(234,234,246,0.22);
  --ac:#a89cf7; --acd:rgba(168,156,247,0.11); --acd2:rgba(168,156,247,0.2); --acb:rgba(168,156,247,0.28);
  --green:#5de8b0; --red:#ff6e6e;
  --nav:52px; --tabs:36px; --adtop:40px; --inp:64px; --side:190px;
}
:root.lt {
  --bg:#eeeef6; --surf:#ffffff; --surf2:#f4f4fb;
  --gl:rgba(0,0,0,0.04); --glh:rgba(0,0,0,0.07);
  --bd:rgba(0,0,0,0.09); --bds:rgba(0,0,0,0.17);
  --tx:#0f0f28; --sub:rgba(15,15,40,0.5); --sub2:rgba(15,15,40,0.28);
  --ac:#5540d0; --acd:rgba(85,64,208,0.08); --acd2:rgba(85,64,208,0.15); --acb:rgba(85,64,208,0.26);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:radial-gradient(circle farthest-corner at center,#3C2A6B 0%,#1C0E3A 100%);color:var(--tx);font-size:14px;line-height:1.65}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bds);border-radius:2px}

/* ═══════════════════════════════
   SPHERE  — thin 3px rings, floaty & light
═══════════════════════════════ */
.sphere{position:relative;border-radius:50%;flex-shrink:0;perspective:800px}
.sphere .r{position:absolute;inset:0;border-radius:50%;box-sizing:border-box;border-style:solid;border-color:transparent;border-width:3px}

/* sizes — all use the same thin 3px ring weight */
.s-nav{width:24px;height:24px}
.s-inp{width:18px;height:18px}
.s-load{width:64px;height:64px}
.s-xl{width:64px;height:64px}

/* ring colours — light #EFEFFA matches reference exactly */
.sphere .r:nth-child(1){border-bottom-color:#EFEFFA;animation:rA 1s linear infinite}
.sphere .r:nth-child(2){border-right-color:#EFEFFA;animation:rB 1s linear infinite}
.sphere .r:nth-child(3){border-top-color:#EFEFFA;animation:rC 1s linear infinite}

@keyframes rA{0%{transform:rotateX(35deg) rotateY(-45deg) rotateZ(0deg)}100%{transform:rotateX(35deg) rotateY(-45deg) rotateZ(360deg)}}
@keyframes rB{0%{transform:rotateX(50deg) rotateY(10deg)  rotateZ(0deg)}100%{transform:rotateX(50deg) rotateY(10deg)  rotateZ(360deg)}}
@keyframes rC{0%{transform:rotateX(35deg) rotateY(55deg)  rotateZ(0deg)}100%{transform:rotateX(35deg) rotateY(55deg)  rotateZ(360deg)}}

/* pulse glow when chatting */
@keyframes glowPulse{
  0%,100%{filter:drop-shadow(0 0 4px rgba(168,156,247,0.3))}
  50%    {filter:drop-shadow(0 0 16px rgba(168,156,247,1)) drop-shadow(0 0 32px rgba(168,156,247,0.5))}
}
.sphere.pulsing{animation:glowPulse 2s ease-in-out infinite}
.sphere.pulsing .r:nth-child(1){border-bottom-color:#EFEFFA}
.sphere.pulsing .r:nth-child(2){border-right-color:#EFEFFA}
.sphere.pulsing .r:nth-child(3){border-top-color:#EFEFFA}

.wordmark{
  font-family:'Syne',sans-serif;font-size:1.02rem;font-weight:700;letter-spacing:-.3px;
  background:linear-gradient(130deg,var(--tx) 40%,var(--ac));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* ═══════════════════════════════
   NAV
═══════════════════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:700;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(7,7,16,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);
}
:root.lt .nav{background:rgba(238,238,246,.94)}
.nav-brand{display:flex;align-items:center;gap:9px;flex-shrink:0}
.nav-gap{flex:1}
.nav-r{display:flex;align-items:center;gap:6px}
.ibtn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:none;color:var(--sub);transition:.15s;flex-shrink:0}
.ibtn:hover{background:var(--glh);color:var(--tx)}
.ibtn .material-symbols-outlined{font-size:18px}

.auto-pill{display:flex;align-items:center;gap:6px;padding:4px 11px 4px 8px;border-radius:99px;background:var(--gl);border:1px solid var(--bd);cursor:pointer;transition:.18s;font-size:.7rem;color:var(--sub);white-space:nowrap;user-select:none}
.auto-pill.on{background:var(--acd2);border-color:var(--acb);color:var(--ac)}
.auto-pill .material-symbols-outlined{font-size:14px}
.tog-sm{width:26px;height:15px;border-radius:8px;background:var(--gl);border:1px solid var(--bd);position:relative;flex-shrink:0;transition:.2s}
.tog-sm.on{background:var(--acd2);border-color:var(--acb)}
.tog-sm::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;top:1.5px;left:1.5px;background:var(--sub);transition:.2s}
.tog-sm.on::after{transform:translateX(11px);background:var(--ac)}

/* ═══════════════════════════════
   TABS
═══════════════════════════════ */
.tabs-bar{
  position:fixed;top:var(--nav);left:0;right:0;height:var(--tabs);z-index:600;
  display:flex;align-items:center;padding:0 8px;gap:3px;
  background:rgba(7,7,16,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);overflow-x:auto;overflow-y:hidden;
}
:root.lt .tabs-bar{background:rgba(238,238,246,.92)}
.tabs-bar::-webkit-scrollbar{height:0}
.tab{display:flex;align-items:center;gap:5px;padding:0 10px;height:24px;border-radius:6px;cursor:pointer;transition:.13s;flex-shrink:0;font-size:.73rem;color:var(--sub);border:1px solid transparent;max-width:148px;min-width:60px}
.tab:hover{background:var(--glh);color:var(--tx)}
.tab.active{background:var(--acd);border-color:var(--acb);color:var(--ac)}
.tab-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.tab-x{width:14px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:.12s;border-radius:3px;cursor:pointer}
.tab:hover .tab-x{opacity:1}
.tab-x:hover{background:rgba(255,100,100,.18);color:var(--red)}
.tab-x .material-symbols-outlined{font-size:10px}
.new-tab{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:1px solid var(--bd);color:var(--sub);transition:.13s}
.new-tab:hover{background:var(--glh);color:var(--tx)}
.new-tab .material-symbols-outlined{font-size:13px}

/* ═══════════════════════════════
   TOP AD BAR (below tabs)
═══════════════════════════════ */
.top-ad{
  position:fixed;
  top:calc(var(--nav) + var(--tabs));
  left:0;right:0;height:var(--adtop);z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:rgba(10,10,20,.7);
  border-bottom:1px dashed rgba(255,255,255,0.07);
  font-size:.72rem;color:var(--sub2);font-style:italic;letter-spacing:.3px;
}
:root.lt .top-ad{background:rgba(240,240,248,.8)}

/* ═══════════════════════════════
   LAYOUT
═══════════════════════════════ */
.layout{
  position:fixed;
  top:calc(var(--nav) + var(--tabs) + var(--adtop));
  left:0;right:0;bottom:0;
  display:flex;
}
/* desktop: side ad */
.chat-col{flex:1;display:grid;grid-template-rows:1fr var(--inp);min-width:0;overflow:hidden}
.ad-col{width:var(--side);flex-shrink:0;border-left:1px solid var(--bd);background:var(--surf);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:14px 10px}
.ad-block{width:100%;flex:1;border-radius:10px;border:1px dashed var(--bd);display:flex;align-items:center;justify-content:center;color:var(--sub2);font-size:.68rem;font-style:italic}
.ad-block-sm{width:100%;height:80px;flex-shrink:0;border-radius:8px;border:1px dashed var(--bd);display:flex;align-items:center;justify-content:center;color:var(--sub2);font-size:.65rem;font-style:italic}

/* ═══════════════════════════════
   MOBILE  ≤ 680px
═══════════════════════════════ */
@media(max-width:680px){
  :root{--nav:50px;--tabs:34px;--adtop:36px;--inp:60px}
  .ad-col{display:none}
  .auto-pill span.label{display:none}
  .top-ad{font-size:.66rem}
  .bub{max-width:92%}
  .mlist{padding:14px 12px;gap:10px}
  .welcome{padding:28px 16px}
  .wt{font-size:1.3rem}
  .chips{gap:6px}
  .chip{font-size:.71rem;padding:5px 11px}
  .ibar input{font-size:.85rem}
  /* bottom banner ad on mobile instead of side */
  .mobile-ad-bottom{
    display:flex;position:fixed;bottom:var(--inp);left:0;right:0;height:48px;
    background:rgba(10,10,20,.85);border-top:1px dashed rgba(255,255,255,0.07);
    align-items:center;justify-content:center;
    font-size:.68rem;color:var(--sub2);font-style:italic;z-index:450;
  }
  :root.lt .mobile-ad-bottom{background:rgba(240,240,248,.9)}
  .layout{bottom:calc(var(--inp) + 48px)}
}
@media(min-width:681px){
  .mobile-ad-bottom{display:none}
}

/* ═══════════════════════════════
   MESSAGES
═══════════════════════════════ */
.msgs{overflow-y:auto;display:flex;flex-direction:column}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:36px 20px;text-align:center}
.w-sphere{margin-bottom:18px}
.wt{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;opacity:.92}
.ws{font-size:.85rem;color:var(--sub);max-width:300px;line-height:1.65}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:16px;max-width:500px}
.chip{padding:6px 13px;border-radius:99px;background:var(--gl);border:1px solid var(--bd);font-size:.74rem;cursor:pointer;transition:.15s;color:var(--sub)}
.chip:hover{border-color:var(--acb);color:var(--ac);background:var(--acd)}
.mlist{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.mrow{display:flex}
.mrow.u{justify-content:flex-end}
.mrow.a{justify-content:flex-start}
.bub{max-width:80%;padding:11px 14px;border-radius:14px;font-size:.895rem;line-height:1.68}
.bub.u{background:var(--acd2);border:1px solid var(--acb);border-bottom-right-radius:3px}
.bub.a{background:var(--gl);border:1px solid var(--bd);border-bottom-left-radius:3px}
.bub.think{padding:10px 14px;color:var(--sub)}
.bi{display:flex;flex-direction:column;gap:7px}

@keyframes blurIn{from{opacity:0;filter:blur(16px);transform:translateY(6px)}to{opacity:1;filter:blur(0);transform:translateY(0)}}
.bub.reveal{animation:blurIn .38s cubic-bezier(.16,1,.3,1) forwards}

.dots{display:flex;gap:4px;align-items:center}
.dots i{display:block;width:5px;height:5px;border-radius:50%;background:var(--sub);animation:dp 1.4s ease infinite;font-style:normal}
.dots i:nth-child(2){animation-delay:.2s}
.dots i:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{transform:scale(.65);opacity:.25}50%{transform:scale(1);opacity:1}}

.btxt{display:flex;flex-direction:column;gap:4px}
.btxt p{margin:0}
.btxt strong{font-weight:600}
.btxt em{font-style:italic;opacity:.85}
.btxt code{font-family:'JetBrains Mono',monospace;font-size:.78em;background:rgba(255,255,255,.09);border:1px solid var(--bd);padding:1px 5px;border-radius:4px}
:root.lt .btxt code{background:rgba(0,0,0,.07)}
.btxt ul,.btxt ol{padding-left:16px}
.btxt li{margin-bottom:3px}

/* code widget */
.cw{background:#08080f;border:1px solid var(--bds);border-radius:10px;overflow:hidden;width:100%;max-width:580px}
:root.lt .cw{background:#1c1c32}
.cw-h{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--bd)}
.cw-lang{font-family:'JetBrains Mono',monospace;font-size:.64rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--ac);font-weight:500}
.cw-btns{display:flex;gap:5px}
.cw-btn{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:.66rem;cursor:pointer;background:var(--gl);border:1px solid var(--bd);color:var(--sub);font-family:'DM Sans',sans-serif;transition:.13s}
.cw-btn:hover{color:var(--tx);border-color:var(--bds);background:var(--glh)}
.cw-btn.ok{color:var(--green);border-color:rgba(93,232,176,.3)}
.cw-btn .material-symbols-outlined{font-size:12px}
.cw-body{overflow-x:auto;padding:12px 14px}
.cw-body pre{margin:0!important;background:transparent!important;padding:0!important}
.cw-body code{font-family:'JetBrains Mono',monospace!important;font-size:.79rem!important;background:transparent!important}

/* open link button */
.cmdbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;background:var(--acd);border:1px solid var(--acb);color:var(--ac);font-size:.8rem;cursor:pointer;transition:.15s;text-decoration:none;font-family:'DM Sans',sans-serif;margin-top:3px}
.cmdbtn:hover{background:var(--acd2)}
.cmdbtn .material-symbols-outlined{font-size:15px}

/* ═══════════════════════════════
   INPUT
═══════════════════════════════ */
.inputz{border-top:1px solid var(--bd);background:rgba(7,7,16,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;padding:10px 14px;gap:9px}
:root.lt .inputz{background:rgba(238,238,246,.97)}
.ibar{flex:1;display:flex;align-items:center;background:var(--gl);border:1px solid var(--bd);border-radius:99px;padding:8px 15px;gap:9px;transition:.18s}
.ibar:focus-within{border-color:var(--bds);background:var(--glh)}
.ibar input{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:.89rem;font-family:'DM Sans',sans-serif}
.ibar input::placeholder{color:var(--sub2)}
.ibar input:disabled{opacity:.45}
.sbtn{width:32px;height:32px;border-radius:50%;border:none;background:var(--acd2);color:var(--ac);cursor:pointer;transition:.16s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sbtn:hover{background:rgba(168,156,247,.32)}
.sbtn:disabled{opacity:.3;cursor:not-allowed}
.sbtn .material-symbols-outlined{font-size:16px}

/* ═══════════════════════════════
   SETTINGS
═══════════════════════════════ */
.sov{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.55);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:16px}
.spanel{background:var(--surf);border:1px solid var(--bds);border-radius:18px;width:360px;max-width:100%;padding:20px;box-shadow:0 28px 70px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto}
.sp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sp-title{font-family:'Syne',sans-serif;font-size:.98rem;font-weight:700}
.sp-sec{margin-bottom:16px}
.sp-lbl{font-size:.63rem;text-transform:uppercase;letter-spacing:1.8px;color:var(--sub2);font-weight:700;margin-bottom:8px}
.sp-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--gl);border:1px solid var(--bd);border-radius:10px;margin-bottom:5px}
.sp-rl{font-size:.84rem}
.sp-rs{font-size:.7rem;color:var(--sub);margin-top:1px}
.tog{width:38px;height:20px;border-radius:10px;background:var(--gl);border:1px solid var(--bd);position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.tog.on{background:var(--acd2);border-color:var(--acb)}
.tog::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--sub);top:2px;left:2px;transition:.2s}
.tog.on::after{transform:translateX(18px);background:var(--ac)}
.sp-model{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;background:var(--acd);border:1px solid var(--acb);color:var(--ac);font-size:.68rem;font-weight:600}
.sp-model .material-symbols-outlined{font-size:12px}
.danger-btn{width:100%;padding:9px;border-radius:8px;border:1px solid rgba(255,100,100,.22);background:rgba(255,100,100,.04);color:var(--red);font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:.16s}
.danger-btn:hover{background:rgba(255,100,100,.09)}

/* ═══════════════════════════════
   ONBOARDING SLIDES
═══════════════════════════════ */
.onb{position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

/* background glow */
.onb-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(168,156,247,0.12) 0%,transparent 70%);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}

.onb-inner{position:relative;z-index:1;width:100%;max-width:480px;padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center}

/* slide transition */
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.slide-content{animation:slideUp .42s cubic-bezier(.16,1,.3,1) forwards}

.onb-sphere-wrap{margin-bottom:26px}
.onb-hed{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;line-height:1.2;margin-bottom:10px}
.onb-hed em{font-style:normal;-webkit-text-fill-color:transparent;background:linear-gradient(130deg,var(--ac),#e0d8ff);-webkit-background-clip:text}
.onb-sub{font-size:.9rem;color:var(--sub);max-width:340px;line-height:1.7}

/* feature pills row */
.feat-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
.feat{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;background:var(--gl);border:1px solid var(--bd);font-size:.78rem;color:var(--sub)}
.feat .material-symbols-outlined{font-size:16px;color:var(--ac)}

/* progress dots */
.onb-dots{display:flex;gap:7px;margin-top:28px}
.onb-dot{width:7px;height:7px;border-radius:50%;background:var(--bds);transition:.25s;cursor:pointer}
.onb-dot.active{background:var(--ac);width:20px;border-radius:4px}

/* nav buttons */
.onb-btns{display:flex;gap:10px;margin-top:22px;width:100%}
.onb-btn{flex:1;padding:11px;border-radius:11px;border:1px solid var(--bd);background:var(--gl);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:.16s}
.onb-btn:hover{background:var(--glh);color:var(--tx)}
.onb-btn.primary{background:var(--acd2);border-color:var(--acb);color:var(--ac);font-weight:500}
.onb-btn.primary:hover{background:rgba(168,156,247,.28)}
.onb-skip{font-size:.73rem;color:var(--sub2);cursor:pointer;margin-top:12px;padding:4px 8px;border-radius:5px;transition:.14s}
.onb-skip:hover{color:var(--sub)}

/* ═══════════════════════════════
   MODEL SELECT
═══════════════════════════════ */
.msel{position:fixed;inset:0;z-index:8900;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.msel-inner{max-width:440px;width:100%;text-align:center}
.msel-sphere{display:flex;justify-content:center;margin-bottom:26px}
.msel-t{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:5px}
.msel-s{font-size:.83rem;color:var(--sub);margin-bottom:24px;line-height:1.6}
.mcard{background:var(--gl);border:1px solid var(--bd);padding:14px 16px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;transition:.18s;text-align:left}
.mcard:hover{border-color:var(--acb);background:var(--glh)}

/* ══ SYSTEM PROMPT ══ */
const buildSys = (autoOpen) => `You are Dash — the AI assistant built into DashAI, a browser-native AI that runs 100% on the user's device using WebGPU. Zero servers. Zero cloud. Completely private.

Your name is Dash. If asked who you are: you're Dash, the on-device AI inside DashAI.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
OPENING LINKS — THIS IS CRITICAL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
When a user asks you to open, visit, go to, or navigate to ANY website, you MUST include the DashAI link tag in your response:

  [CMD:open:https://full-url-here.com]

This is a proprietary DashAI syntax. The DashAI client detects it and ${autoOpen ? 'opens the URL automatically in a new tab.' : 'shows the user a clickable button to open the URL.'}

IMPORTANT RULES:
1. ALWAYS include [CMD:open:URL] when the user wants to visit a site. Do NOT just write the URL as text or describe how to navigate. Use the tag.
2. Guess the correct URL from context — "open google" → [CMD:open:https://google.com], "search for cats" → [CMD:open:https://google.com/search?q=cats], "open github" → [CMD:open:https://github.com], "youtube" → [CMD:open:https://youtube.com], "reddit AI" → [CMD:open:https://www.reddit.com/search/?q=AI], "twitter" → [CMD:open:https://twitter.com]
3. If asked HOW link-opening works, explain: "DashAI uses its own custom link syntax — when I include a special tag in my response, the DashAI client detects it and handles opening the URL. It's a proprietary feature built by the DashAI team."
4. Never expose the raw [CMD:open:...] syntax unless the user specifically asks how it works.
5. Keep your message natural — e.g. "Opening GitHub for you!" then include the tag on the same line or nearby.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
CODE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Always use fenced code blocks with the language:
\`\`\`javascript
// code here
\`\`\`

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
RESPONSE STYLE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- Write in full, natural sentences. You're a smart assistant having a real conversation.
- Don't pad responses with "Of course!" or "Certainly!" — just answer directly.
- Short question = concise answer. Deep question = thorough answer.
- Use **bold** and bullet points only when they genuinely help readability.
- Never use weird bracket formats like [Response: text] or [DM: text]. Just write normally.`;

/* ══ UTILS ══ */
const waitWLLM = () => new Promise(r => { if(window._wllm) r(); else window.addEventListener('wllm',r,{once:true}); });
const hasGPU   = () => !!navigator.gpu;
const uid      = () => Math.random().toString(36).slice(2,9);

function parseAI(raw) {
  const cmds = [];
  let text = raw.replace(/\[CMD:open:(.*?)\]/g, (_,u) => { cmds.push(u.trim()); return ''; });
  const segs = [];
  const re = /```(\w*)\r?\n?([\s\S]*?)```/g;
  let last=0, m;
  while((m=re.exec(text))!==null){
    const b=text.slice(last,m.index).trim();
    if(b) segs.push({t:'txt',v:b});
    segs.push({t:'code',lang:m[1]||'plaintext',v:m[2].trim()});
    last=m.index+m[0].length;
  }
  const tail=text.slice(last).trim();
  if(tail) segs.push({t:'txt',v:tail});
  cmds.forEach(u=>segs.push({t:'cmd',v:u}));
  return segs;
}

function iMd(s) {
  return s
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}

/* ══ COMPONENTS ══ */
const Sphere = ({cls=''}) => (

const CodeWidget = ({lang,code}) => {
  const [ok,setOk]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.Prism){
      const el=ref.current.querySelector('code');
      if(el) window.Prism.highlightElement(el);
    }
  },[code]);
  const copy=()=>navigator.clipboard.writeText(code).then(()=>{setOk(true);setTimeout(()=>setOk(false),2000);});
  const dl=()=>{
    const ext=LANG_EXT[lang.toLowerCase()]||'txt';
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([code],{type:'text/plain'})),download:`dash-snippet.${ext}`});
    a.click();URL.revokeObjectURL(a.href);
  };
  return (
    <div className="cw">
      <div className="cw-h">
        <span className="cw-lang">{lang||'code'}</span>
        <div className="cw-btns">
          <button className={`cw-btn${ok?' ok':''}`} onClick={copy}>
            <span className="material-symbols-outlined">{ok?'check':'content_copy'}</span>{ok?'Copied!':'Copy'}
          </button>
          <button className="cw-btn" onClick={dl}>
            <span className="material-symbols-outlined">download</span>Save
          </button>
        </div>
      </div>
      <div className="cw-body" ref={ref}>
        <pre className={`language-${lang}`}><code className={`language-${lang}`}>{code}</code></pre>
      </div>
    </div>
  );
};

const Bubble = ({msg, isLatest, autoOpen}) => {
  const [revealed,setRevealed]=useState(false);
  useEffect(()=>{
    if(msg.role==='ai'&&!msg.thinking&&isLatest){
      const t=setTimeout(()=>setRevealed(true),40);
      return()=>clearTimeout(t);
    }
  },[msg.role,msg.thinking,isLatest]);
  useEffect(()=>{
    if(autoOpen&&msg.role==='ai'&&!msg.thinking&&isLatest&&msg.text){
      const ms=msg.text.match(/\[CMD:open:(.*?)\]/g);
      if(ms) ms.forEach(tag=>{
        const url=tag.replace('[CMD:open:','').replace(']','').trim();
        setTimeout(()=>window.open(url,'_blank'),500);
      });
    }
  },[msg.text,msg.thinking]);

  if(msg.role==='user') return <div className="mrow u"><div className="bub u">{msg.text}</div></div>;
  if(msg.thinking) return <div className="mrow a"><div className="bub a think"><div className="dots"><i/><i/><i/></div></div></div>;

  const segs=parseAI(msg.text);
  const cls=`bub a${isLatest?(revealed?' reveal':''):''}`;
  return (
    <div className="mrow a">
      <div className={cls} style={isLatest&&!revealed?{opacity:0}:{}}>
        <div className="bi">
          {segs.map((s,i)=>{
            if(s.t==='code') return <CodeWidget key={i} lang={s.lang} code={s.v}/>;
            if(s.t==='cmd'){
              const pretty=s.v.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'');
              return(
                <a key={i} className="cmdbtn" href={s.v} target="_blank" rel="noopener"
                   onClick={e=>{e.preventDefault();window.open(s.v,'_blank');}}>
                  <span className="material-symbols-outlined">open_in_new</span>Open {pretty}
                </a>
              );
            }
            const lines=s.v.split(/\n/).filter(l=>l.trim());
            return(
              <div key={i} className="btxt">
                {lines.map((ln,j)=>{
                  const li=ln.match(/^[-•*]\s+(.*)/);
                  if(li) return(
                    <p key={j} style={{paddingLeft:'13px',position:'relative'}}>
                      <span style={{position:'absolute',left:0,color:'var(--ac)',fontSize:'.58rem',top:'6px'}}>▸</span>
                      <span dangerouslySetInnerHTML={{__html:iMd(li[1])}}/>
                    </p>
                  );
                  const h=ln.match(/^#{1,3}\s+(.*)/);
                  if(h) return <p key={j} style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:'.94rem',marginBottom:'1px'}} dangerouslySetInnerHTML={{__html:iMd(h[1])}}/>;
                  return <p key={j} dangerouslySetInnerHTML={{__html:iMd(ln)}}/>;
                })}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ══ ONBOARDING SLIDES ══ */
const Onboarding = ({ onDone }) => {
  const [slide, setSlide] = useState(0);
  const [key, setKey]     = useState(0); // force re-animation
  const total = SLIDES.length;

  const go = (n) => { setSlide(n); setKey(k=>k+1); };
  const next = () => slide < total-1 ? go(slide+1) : onDone();
  const skip = () => onDone();

  const s = SLIDES[slide];

  return (
    <div className="onb">
      <div className="onb-glow"/>
      <div className="onb-inner">
        <div key={key} className="slide-content" style={{display:'flex',flexDirection:'column',alignItems:'center',width:'100%'}}>

          {/* Icon / sphere */}
          <div className="onb-sphere-wrap">
            {slide === 0
              ? <Sphere cls="s-xl pulsing"/>
              : (
                <div style={{width:80,height:80,borderRadius:'50%',background:'var(--acd)',border:'1px solid var(--acb)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span className="material-symbols-outlined" style={{fontSize:38,color:'var(--ac)'}}>{s.icon}</span>
                </div>
              )
            }
          </div>

          <h1 className="onb-hed">{s.hed}</h1>
          <p className="onb-sub">{s.sub}</p>

          <div className="feat-row">
            {s.feats.map((f,i)=>(
              <div key={i} className="feat">
                <span className="material-symbols-outlined">{f.icon}</span>
                {f.label}
              </div>
            ))}
          </div>
        </div>

        {/* Dots */}
        <div className="onb-dots">
          {SLIDES.map((_,i)=>(
            <div key={i} className={`onb-dot${i===slide?' active':''}`} onClick={()=>go(i)}/>
          ))}
        </div>

        {/* Buttons */}
        <div className="onb-btns">
          {slide > 0 && (
            <button className="onb-btn" onClick={()=>go(slide-1)}>Back</button>
          )}
          <button className="onb-btn primary" onClick={next}>
            {slide === total-1 ? 'Get Started →' : 'Next →'}
          </button>
        </div>
        <div className="onb-skip" onClick={skip}>Skip intro</div>
      </div>
    </div>
  );
};

/* ══ MAIN APP ══ */
const App = () => {
  const [stage,    setStage]    = useState('onboarding'); // onboarding | modelselect | loading | main
  const [lmsg,     setLmsg]     = useState('');
  const [lpct,     setLpct]     = useState(0);
  const [convs,    setConvs]    = useState([{id:'c1',title:'Chat 1',msgs:[]}]);
  const [curId,    setCurId]    = useState('c1');
  const [q,        setQ]        = useState('');
  const [autoOpen, setAutoOpen] = useState(false);
  const [theme,    setTheme]    = useState('dark');
  const [sets,     setSets]     = useState(false);
  const [busy,     setBusy]     = useState(false);
  const [model,    setModel]    = useState(null);
  const [gpuErr,   setGpuErr]   = useState(false);

  const eng  = useRef(null);
  const endR = useRef(null);
  const iRef = useRef(null);

  const cur  = convs.find(c=>c.id===curId)||convs[0];
  const msgs = cur?.msgs||[];
  const chatActive = msgs.filter(m=>!m.thinking&&m.text).length>0;

  useEffect(()=>{ if(!hasGPU()) setGpuErr(true); },[]);
  useEffect(()=>{ document.documentElement.classList.toggle('lt',theme==='light'); },[theme]);
  useEffect(()=>{ endR.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  const updateMsgs  = (id,fn) => setConvs(cs=>cs.map(c=>c.id===id?{...c,msgs:fn(c.msgs)}:c));
  const updateTitle = (id,t)  => setConvs(cs=>cs.map(c=>c.id===id?{...c,title:t}:c));

  const newConv = () => {
    const id=uid();
    setConvs(cs=>[...cs,{id,title:`Chat ${cs.length+1}`,msgs:[]}]);
    setCurId(id);
    setTimeout(()=>iRef.current?.focus(),80);
  };

  const deleteConv = (id) => {
    setConvs(cs=>{
      const next=cs.filter(c=>c.id!==id);
      if(next.length===0){const nc={id:uid(),title:'Chat 1',msgs:[]};setCurId(nc.id);return[nc];}
      if(curId===id) setCurId(next[next.length-1].id);
      return next;
    });
  };

  const initAI = async(m) => {
    if(!hasGPU()){setGpuErr(true);return;}
    setModel(m); setStage('loading'); setLmsg('Connecting…');
    try {
      await waitWLLM();
      const {CreateMLCEngine}=window.webllm;
      eng.current=await CreateMLCEngine(m.id,{
        initProgressCallback:r=>{
          setLpct(Math.round((r.progress||0)*100));
          setLmsg(r.text||`Loading ${m.name}…`);
        }
      });
      setStage('main');
      setTimeout(()=>iRef.current?.focus(),120);
    } catch(e){
      console.error(e); setStage('modelselect');
      alert(`Failed to load: ${e.message}\n\nEnable WebGPU: chrome://flags/#enable-unsafe-webgpu`);
    }
  };

  const send = async(override) => {
    const text=(override||q).trim();
    if(!text||busy||!eng.current) return;
    setQ(''); setBusy(true);
    if(msgs.length===0) updateTitle(curId, text.length>34?text.slice(0,32)+'…':text);
    const tid=uid();
    updateMsgs(curId,m=>[...m,{id:uid(),role:'user',text}]);
    updateMsgs(curId,m=>[...m,{id:tid,role:'ai',thinking:true,text:''}]);
    try {
      const sys=buildSys(autoOpen);
      const ctx=msgs.slice(-10).filter(m=>m.text&&!m.thinking).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}));
      const [result]=await Promise.all([
        eng.current.chat.completions.create({
          messages:[{role:'system',content:sys},...ctx,{role:'user',content:text}],
          stream:false,
        }),
        new Promise(r=>setTimeout(r,700))
      ]);
      const aiText=result.choices[0].message.content;
      updateMsgs(curId,m=>{const n=[...m];const i=n.findIndex(x=>x.id===tid);if(i!==-1)n[i]={...n[i],thinking:false,text:aiText,isNew:true};return n;});
    } catch(e){
      console.error(e);
      updateMsgs(curId,m=>{const n=[...m];const i=n.findIndex(x=>x.id===tid);if(i!==-1)n[i]={...n[i],thinking:false,text:`⚠️ Error: ${e.message}`,isNew:true};return n;});
    }
    setBusy(false);
    setTimeout(()=>iRef.current?.focus(),50);
  };

  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
  const latestAI=(()=>{for(let i=msgs.length-1;i>=0;i--)if(msgs[i].role==='ai')return i;return -1;})();

  /* ── render stages ── */
  if(stage==='onboarding') return <Onboarding onDone={()=>setStage('modelselect')}/>;
  if(stage==='modelselect') return <ModelSelect onSelect={initAI} gpuErr={gpuErr}/>;

  if(stage==='loading') return(
    <div className="ldr">
      <Sphere cls="s-load pulsing"/>
      <p className="ldr-msg">{lmsg}</p>
      <div className="ptrack"><div className="pfill" style={{width:`${lpct}%`}}/></div>
      <p className="ldr-hint">Cached after first download — next load is instant.</p>
    </div>
  );

  /* ── MAIN ── */
  return (
    <>
      {sets&&<Settings onClose={()=>setSets(false)} theme={theme} setTheme={setTheme} autoOpen={autoOpen} setAutoOpen={setAutoOpen} model={model} onClear={()=>{const id=uid();setConvs([{id,title:'Chat 1',msgs:[]}]);setCurId(id);}}/>}

      {/* NAV */}
      <nav className="nav">
        <div className="nav-brand">
          <Sphere cls={`s-nav${chatActive?' pulsing':''}`}/>
          <span className="wordmark">DashAI</span>
        </div>
        <div className="nav-gap"/>
        <div className="nav-r">
          <div className={`auto-pill${autoOpen?' on':''}`} onClick={()=>setAutoOpen(v=>!v)}>
            <span className="material-symbols-outlined">{autoOpen?'link':'link_off'}</span>
            <span className="label">Auto-open</span>
            <div className={`tog-sm${autoOpen?' on':''}`}/>
          </div>
          <button className="ibtn" onClick={()=>setSets(true)}><span className="material-symbols-outlined">settings</span></button>
        </div>
      </nav>

      {/* TABS */}
      <div className="tabs-bar">
        {convs.map(c=>(
          <div key={c.id} className={`tab${c.id===curId?' active':''}`} onClick={()=>setCurId(c.id)}>
            <span className="tab-title">{c.title}</span>
            <span className="tab-x" onClick={e=>{e.stopPropagation();deleteConv(c.id);}}>
              <span className="material-symbols-outlined">close</span>
            </span>
          </div>
        ))}
        <div className="new-tab" onClick={newConv} title="New chat">
          <span className="material-symbols-outlined">add</span>
        </div>
      </div>

      {/* TOP AD — below tabs, above content */}
      <div className="top-ad">ads go here</div>

      {/* LAYOUT */}
      <div className="layout">
        <div className="chat-col">
          {/* Messages */}
          <div className="msgs">
            {msgs.length===0?(
              <div className="welcome">
                <div className="w-sphere"><Sphere cls="s-xl"/></div>
                <h2 className="wt">Hey, I'm Dash.</h2>
                <p className="ws">Your on-device AI. Ask me anything, open sites, write code — totally offline.</p>
                <div className="chips">
                  {CHIPS.map(c=><div key={c} className="chip" onClick={()=>send(c)}>{c}</div>)}
                </div>
              </div>
            ):(
              <div className="mlist">
                {msgs.map((msg,i)=>(
                  <Bubble key={msg.id||i} msg={msg} isLatest={i===latestAI} autoOpen={autoOpen}/>
                ))}
                <div ref={endR}/>
              </div>
            )}
          </div>

          {/* Input */}
          <div className="inputz">
            <div className="ibar">
              <div style={{flexShrink:0,opacity:.45,display:'flex',alignItems:'center'}}>
                <Sphere cls={`s-inp${busy?' pulsing':''}`}/>
              </div>
              <input
                ref={iRef}
                placeholder={autoOpen?'Ask Dash — links open automatically…':'Ask Dash anything…'}
                value={q}
                onChange={e=>setQ(e.target.value)}
                onKeyDown={onKey}
                disabled={busy}
              />
            </div>
            <button className="sbtn" onClick={()=>send()} disabled={busy||!q.trim()}>
              <span className="material-symbols-outlined">{busy?'hourglass_top':'arrow_upward'}</span>
            </button>
          </div>
        </div>

        {/* Sidebar ad — desktop only, hidden on mobile via CSS */}
        <div className="ad-col">
          <div className="ad-block">ads go here</div>
          <div className="ad-block-sm">ads go here</div>
        </div>
      </div>

      {/* Mobile bottom ad — shows only on mobile */}
      <div className="mobile-ad-bottom">ads go here</div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
